[tox]
envlist = py39, py310, py311, py312
isolated_build = true

[testenv]
deps =
    pytest
    pytest-cov
    coverage[toml]
commands =
    pytest tests/ --cov=pymars --cov-report=term-missing --cov-report=html
    python -c "import coverage; cov = coverage.Coverage(); cov.load(); print(f'Coverage: {cov.report():.2f}%')"

[testenv:lint]
deps = ruff
commands =
    ruff check pymars tests
    ruff format --check pymars tests

[testenv:type-check]
deps =
    ty
commands =
    ty check --error-on-warning pymars/

[testenv:format]
deps =
    ruff
commands =
    ruff check pymars tests
    ruff format --check pymars tests

[testenv:docs]
deps =
    sphinx
commands =
    sphinx-build -b html docs docs/_build
