site_name: pymars Documentation
site_url: https://edithatogo.github.io/pymars/
repo_url: https://github.com/edithatogo/pymars
repo_name: edithatogo/pymars
edit_uri: edit/main/docs/
theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Model Spec: model_spec.md
  - Rust Core: rust_core.md
  - Training Core Migration: training_core_migration.md
  - Training Orchestration Inventory: training_orchestration_inventory.md
  - Bindings: bindings.md
  - Binding Release: binding_release.md
  - Binding Backend Decisions: binding_backend_decisions.md
  - Binding ABI and API Contract: binding_abi_contract.md
  - CI and Quality Policy: ci_quality.md
  - Supply Chain Security: supply_chain.md
  - Release Checklist: release_checklist.md
  - Release Inventory: release_inventory.md
  - Package Release Paths: package_release_paths.md
  - Remaining Roadmap: remaining_roadmap.md
  - Conformance: conformance.md
  - API Reference: api.md
  - Design: design.md
  - Requirements: requirements.md
  - Tasks: tasks.md
  - Tutorials:
    - Basic: tutorials/basic.md
    - Advanced: tutorials/advanced.md
  - Performance: performance_optimization_plan.md
  - Robustness: robustness_improvement_plan.md
plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/edithatogo/mars
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/mars-earth/

