site_name: pymars Documentation
site_url: https://edithatogo.github.io/pymars/
repo_url: https://github.com/edithatogo/pymars
repo_name: edithatogo/pymars
edit_uri: edit/main/docs/
theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode

nav:
  - Home: index.md
  - Installation: installation.md
  - Usage: usage.md
  - Model Spec: model_spec.md
  - Rust Core: rust_core.md
  - Rust Core Ownership Boundary: rust_core_ownership.md
  - Rust Core Full Conversion Boundary: rust_core_full_conversion_boundary.md
  - Rust Core Observability and Profiling: rust_core_observability.md
  - Scientific Stewardship and HPC Roadmap: scientific_stewardship_and_hpc_roadmap.md
  - Starlight Docs Stack Governance: starlight_docs_stack.md
  - Parity Audit Evidence: parity_audit_evidence.md
  - Parity Table: parity_audit_parity_table.md
  - Consolidated Parity Table: parity_audit_parity_table.md
  - py-earth Feature Matrix: parity_audit_feature_matrix.md
  - Parity Audit Findings: parity_audit_findings.md
  - Parity Audit Upstream Inventory: parity_audit_upstream_inventory.md
  - Parity Audit Handoff: parity_audit_handoff.md
  - Parity Audit Feature Parity Summary: parity_audit_feature_parity_summary.md
  - Parity Audit Behavioral Divergence Summary: parity_audit_behavioral_divergence_summary.md
  - Parity Audit Packaging and Docs Summary: parity_audit_packaging_docs_summary.md
  - Parity Audit Recommendation Summary: parity_audit_recommendation_summary.md
  - Parity Audit Evidence Template: parity_audit_evidence_template.md
  - Parity Audit Rubric: parity_audit_rubric.md
  - Parity Audit Gap Classification: parity_audit_gap_classification.md
  - R earth Feature Matrix: parity_audit_r_earth_matrix.md
  - Parity Audit Repo Gap Matrix: parity_audit_repo_gap_matrix.md
  - Parity Audit Recommendations: parity_audit_recommendations.md
  - Training Core Migration: training_core_migration.md
  - Training Orchestration Inventory: training_orchestration_inventory.md
  - Core Transition Evidence: core_transition_evidence.md
  - Bindings: bindings.md
  - Binding Release: binding_release.md
  - Binding Backend Decisions: binding_backend_decisions.md
  - Binding ABI and API Contract: binding_abi_contract.md
  - Release Metadata: release_metadata.json
  - CI and Quality Policy: ci_quality.md
  - Supply Chain Security: supply_chain.md
  - Publication Handoff: publication_handoff.md
  - Release Checklist: release_checklist.md
  - Release Inventory: release_inventory.md
  - Package Release Paths: package_release_paths.md
  - Remaining Roadmap: remaining_roadmap.md
  - Conformance: conformance.md
  - API Reference: api.md
  - Design: design.md
  - Requirements: requirements.md
  - Tasks: tasks.md
  - Tutorials:
    - Basic: tutorials/basic.md
    - Advanced: tutorials/advanced.md
  - Performance: performance_optimization_plan.md
  - Robustness: robustness_improvement_plan.md
plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/edithatogo/mars
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/mars-earth/

