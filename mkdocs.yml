site_name: mars Documentation
site_url: https://edithatogo.github.io/mars/
repo_url: https://github.com/edithatogo/mars
repo_name: edithatogo/mars
edit_uri: edit/main/docs/
theme:
  name: material
  palette:
    - scheme: default
      primary: teal
      accent: amber
      toggle:
        icon: material/lightbulb
        name: Switch to dark mode
    - scheme: slate
      primary: teal
      accent: amber
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode

nav:
  - Home: docs/index.md
  - Installation: docs/installation.md
  - Usage: docs/usage.md
  - API Reference: docs/api.md
  - Design: docs/design.md
  - Requirements: docs/requirements.md
  - Tasks: docs/tasks.md
  - Tutorials:
    - Basic: docs/tutorials/basic.md
    - Advanced: docs/tutorials/advanced.md
  - Performance: docs/performance_optimization_plan.md
  - Robustness: docs/robustness_improvement_plan.md
  - Contributing: CONTRIBUTING.md
  - Changelog: CHANGELOG.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/edithatogo/mars
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/mars/

