name: Documentation Improvement
description: Suggest improvements to documentation
title: "[Docs]: "
labels: ["documentation"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve our documentation!
  - type: dropdown
    id: doc-type
    attributes:
      label: Documentation Type
      description: What type of documentation needs improvement?
      options:
        - README.md
        - API Documentation
        - User Guide
        - Contributing Guide
        - Examples/Tutorials
        - Code Docstrings
        - Other
    validations:
      required: true
  - type: textarea
    id: current-state
    attributes:
      label: Current State
      description: What is the current state of the documentation?
      placeholder: Describe what's missing, unclear, or outdated
    validations:
      required: true
  - type: textarea
    id: suggested-change
    attributes:
      label: Suggested Change
      description: What would you like to see instead?
    validations:
      required: true
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the documentation improvement here.
