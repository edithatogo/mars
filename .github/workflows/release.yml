name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Build package
        run: uv build

      # ── Publish to TestPyPI first (non-blocking gate) ──
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
        continue-on-error: true

      # ── Publish to PyPI (trusted publishing via OIDC) ──
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      # ── Verify the package is installable from PyPI ──
      - name: Wait for PyPI index update
        run: sleep 30

      - name: Install and smoke-test from PyPI
        run: |
          uv venv .venv
          . .venv/bin/activate
          uv pip install mars-earth
          python -c "import pymars; print(f'mars-earth {pymars.__version__} installed successfully')"

      # ── Create GitHub Release ──
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
