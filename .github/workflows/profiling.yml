name: Profiling

on:
  push:
    branches: [main]
    paths:
      - 'pymars/**/*.py'
  workflow_dispatch:

concurrency:
  group: profiling-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  profile:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev --extra profiling

      - name: Run Scalene profiler
        run: make profile

      - name: Run py-spy on demo
        run: |
          uv run py-spy record -o flame_graph.svg -- python -m pymars.demos.basic_regression_demo

      - name: Upload profiling results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: profiling-results
          path: |
            flame_graph.svg
          retention-days: 30
