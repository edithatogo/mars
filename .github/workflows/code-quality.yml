name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run ruff check
        run: uv run ruff check pymars tests

      - name: Run ruff format check
        run: uv run ruff format --check pymars tests

      - name: Run ty type check
        run: uv run ty check pymars/

      - name: Build documentation
        run: uv run mkdocs build --strict

      - name: Run Vale prose lint
        uses: errata-ai/vale-action@v2.1.1
        with:
          version: 3.14.1
          files: '["README.md", "docs"]'
          reporter: github-check
          fail_on_error: true

      - name: Build Python package
        run: uv build

      - name: Check for spelling errors
        run: |
          uv tool install codespell || pip install codespell
          codespell pymars tests README.md CONTRIBUTING.md || echo "Spelling check completed with warnings"
