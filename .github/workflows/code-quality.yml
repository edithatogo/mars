name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run ruff check
        run: uv run ruff check pymars tests

      - name: Run ruff format check
        run: uv run ruff format --check pymars tests

      - name: Run mypy type check
        run: uv run mypy pymars/ --ignore-missing-imports --no-strict-optional || true

      - name: Check for spelling errors
        run: |
          uv tool install codespell || pip install codespell
          codespell pymars tests README.md CONTRIBUTING.md || echo "Spelling check completed with warnings"
