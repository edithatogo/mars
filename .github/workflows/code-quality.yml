name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: code-quality-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  code-quality:
    runs-on: ubuntu-latest
    env:
      CI_LOG_DIR: .ci-diagnostics

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Check release metadata alignment
        run: uv run python scripts/check_release_alignment.py

      - name: Run Python tests with coverage threshold
        run: |
          mkdir -p "$CI_LOG_DIR"
          set -o pipefail
          uv run pytest tests/ -q --tb=short -x --cov-fail-under=90 | tee "$CI_LOG_DIR/pytest.log"

      - name: Run pre-commit hygiene checks
        run: |
          set -o pipefail
          uv run pre-commit run --all-files ruff | tee "$CI_LOG_DIR/pre-commit-ruff.log"
          uv run pre-commit run --all-files ruff-format | tee "$CI_LOG_DIR/pre-commit-ruff-format.log"
          uv run pre-commit run --all-files codespell | tee "$CI_LOG_DIR/pre-commit-codespell.log"
          uv run pre-commit run --all-files check-yaml | tee "$CI_LOG_DIR/pre-commit-yaml.log"
          uv run pre-commit run --all-files check-toml | tee "$CI_LOG_DIR/pre-commit-toml.log"
          uv run pre-commit run --all-files check-merge-conflict | tee "$CI_LOG_DIR/pre-commit-merge.log"
          uv run pre-commit run --all-files detect-private-key | tee "$CI_LOG_DIR/pre-commit-private-key.log"

      - name: Run ty type check
        run: |
          set -o pipefail
          uv run ty check --error-on-warning pymars/ | tee "$CI_LOG_DIR/ty.log"

      - name: Build documentation
        run: |
          set -o pipefail
          uv run mkdocs build --strict | tee "$CI_LOG_DIR/mkdocs.log"

      - name: Run Vale prose lint
        uses: errata-ai/vale-action@v2.1.1
        with:
          version: 3.14.1
          files: '["README.md", "docs"]'
          reporter: github-check
          fail_on_error: true

      - name: Build Python package
        run: uv build

      - name: Upload diagnostic logs
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: code-quality-diagnostics
          path: .ci-diagnostics/*
          retention-days: 7
