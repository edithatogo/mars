name: Publish to Anaconda.org

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.4)'
        required: true
        default: '1.0.4'
        type: string

permissions:
  contents: read

jobs:
  anaconda:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Get release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute SHA256
        id: sha
        run: |
          curl -sL "https://pypi.org/packages/source/m/mars-earth/mars_earth-${{ steps.tag.outputs.version }}.tar.gz" -o source.tar.gz
          echo "sha256=$(sha256sum source.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate-base: true
          python-version: '3.12'
          channels: conda-forge
          channel-priority: strict

      - name: Install conda-build tooling
        shell: bash -l {0}
        run: |
          conda install -y conda-build anaconda-client

      - name: Generate meta.yaml
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          mkdir -p /tmp/recipe
          cat > /tmp/recipe/meta.yaml <<RECIPE
          {% set name = "mars-earth" %}
          {% set version = "$VERSION" %}

          package:
            name: {{ name|lower }}
            version: {{ version }}

          source:
            url: https://pypi.org/packages/source/m/{{ name }}/{{ name|replace('-', '_') }}-{{ version }}.tar.gz
            sha256: $SHA256

          build:
            noarch: python
            script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
            number: 0

          requirements:
            host:
              - python
              - pip
              - setuptools >=61
            run:
              - python
              - numpy >=1.20.0
              - scikit-learn >=1.0.0
              - matplotlib-base >=3.4.0

          test:
            imports:
              - pymars
            requires:
              - pip
            commands:
              - pip check
              - python -c "import pymars; model = pymars.Earth(); print('mars-earth import OK')"

          about:
            home: https://github.com/edithatogo/mars
            summary: A Pure Python Implementation of Multivariate Adaptive Regression Splines
            description: |
              mars-earth is a pure Python implementation of Multivariate Adaptive
              Regression Splines (MARS), inspired by the popular py-earth library.
              It provides an easy-to-install, scikit-learn compatible version of the
              MARS algorithm without C/Cython dependencies.
            license: Apache-2.0
            license_file: LICENSE
            doc_url: https://edithatogo.github.io/mars/
            dev_url: https://github.com/edithatogo/mars

          extra:
            recipe-maintainers:
              - edithatogo
          RECIPE

      - name: Build package
        shell: bash -l {0}
        env:
          VERSION: ${{ steps.tag.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          conda build /tmp/recipe --output-folder /tmp/conda-bld --no-anaconda-upload

      - name: Upload package to Anaconda.org
        shell: bash -l {0}
        env:
          ANACONDA_TOKEN: ${{ secrets.ANACONDA_TOKEN || secrets.ANACONDA_API_TOKEN }}
          ANACONDA_USER: ${{ vars.ANACONDA_USER || github.repository_owner }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          if [ -z "$ANACONDA_TOKEN" ]; then
            echo "Missing ANACONDA_TOKEN or ANACONDA_API_TOKEN secret."
            exit 1
          fi

          package_file=$(find /tmp/conda-bld/noarch -maxdepth 1 -type f -name "mars-earth-${VERSION}-*" | head -n 1)
          if [ -z "$package_file" ]; then
            echo "Built conda package not found."
            exit 1
          fi

          anaconda -t "$ANACONDA_TOKEN" upload --user "$ANACONDA_USER" --force "$package_file"
