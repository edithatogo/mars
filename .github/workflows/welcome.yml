name: 'Welcome first-time contributors'
on:
  issues:
    types: opened
  pull_request_target:
    types: opened

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Welcome first-time contributor
        uses: actions/github-script@v7
        with:
          script: |
            const author = context.payload.sender.login;
            const actor = context.payload.pull_request ? context.payload.pull_request.user.login : context.payload.issue.user.login;

            // Check if this is a first-time contributor
            const { data: contributorCount } = await github.rest.repos.listContributors({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 1
            });

            const isIssue = context.payload.issue ? true : false;

            if (isIssue) {
              await github.rest.issues.createComment({
                issue_number: context.payload.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `👋 Welcome @${actor}! Thank you for opening your first issue in mars. We appreciate your contribution and will review it shortly. If you have any questions, feel free to ask!`
              });
            } else {
              await github.rest.issues.createComment({
                issue_number: context.payload.pull_request.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🎉 Welcome @${actor}! Thank you for your first pull request to mars! We're excited to have you as a contributor. Our team will review your PR soon. In the meantime, please ensure all CI checks pass.`
              });
            }
