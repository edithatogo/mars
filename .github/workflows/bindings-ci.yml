name: Bindings CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: bindings-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  rust-core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Rust runtime CLI
        run: cargo build --manifest-path rust-runtime/Cargo.toml --bin mars-runtime-cli

      - name: Run Rust format check
        run: cargo fmt --check
        working-directory: rust-runtime

      - name: Run Rust targeted tests
        run: cargo test --test fixture_tests --test foreign_tests --test training_fixture_tests
        working-directory: rust-runtime

      - name: Run Rust package check
        run: cargo package --allow-dirty
        working-directory: rust-runtime

      - name: Upload Rust runtime CLI
        uses: actions/upload-artifact@v7
        with:
          name: mars-runtime-cli
          path: rust-runtime/target/debug/mars-runtime-cli
          retention-days: 7

  python:
    runs-on: ubuntu-latest
    needs: rust-core
    env:
      MARS_RUNTIME_BIN: ${{ github.workspace }}/.ci-artifacts/mars-runtime-cli
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - uses: actions/download-artifact@v4
        with:
          name: mars-runtime-cli
          path: .ci-artifacts

      - run: chmod +x "$MARS_RUNTIME_BIN"

      - run: uv python install 3.12

      - run: uv sync --extra dev

      - run: uv run pytest -q tests/test_binding_conformance.py tests/test_model_spec.py

  go:
    runs-on: ubuntu-latest
    needs: rust-core
    env:
      MARS_RUNTIME_BIN: ${{ github.workspace }}/.ci-artifacts/mars-runtime-cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: mars-runtime-cli
          path: .ci-artifacts

      - run: chmod +x "$MARS_RUNTIME_BIN"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - run: go test ./...
        working-directory: bindings/go

  typescript:
    runs-on: ubuntu-latest
    needs: rust-core
    env:
      MARS_RUNTIME_BIN: ${{ github.workspace }}/.ci-artifacts/mars-runtime-cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: mars-runtime-cli
          path: .ci-artifacts

      - run: chmod +x "$MARS_RUNTIME_BIN"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm test
        working-directory: bindings/typescript

      - run: npm pack --dry-run
        working-directory: bindings/typescript

      - name: Smoke test packed TypeScript runtime
        run: |
          tarball=$(npm pack)
          tmpdir=$(mktemp -d)
          npm init -y --prefix "$tmpdir" >/dev/null
          npm install --prefix "$tmpdir" "$tarball" >/dev/null
          (cd "$tmpdir" && node --input-type=module -e "import('@mars-earth/runtime')")
        working-directory: bindings/typescript

  r:
    runs-on: ubuntu-latest
    needs: rust-core
    env:
      MARS_RUNTIME_BIN: ${{ github.workspace }}/.ci-artifacts/mars-runtime-cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: mars-runtime-cli
          path: .ci-artifacts

      - run: chmod +x "$MARS_RUNTIME_BIN"

      - uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        run: install.packages("jsonlite", repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - name: Build R package
        run: R CMD build bindings/r

      - name: Smoke test built R package
        run: |
          tarball=$(ls marsruntime_*.tar.gz | tail -n 1)
          libdir=$(mktemp -d)
          R CMD INSTALL --library="$libdir" "$tarball"
          Rscript -e "library(marsruntime, lib.loc = '$libdir')"

      - run: Rscript tests/conformance.R
        working-directory: bindings/r

  julia:
    runs-on: ubuntu-latest
    needs: rust-core
    env:
      MARS_RUNTIME_BIN: ${{ github.workspace }}/.ci-artifacts/mars-runtime-cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: mars-runtime-cli
          path: .ci-artifacts

      - run: chmod +x "$MARS_RUNTIME_BIN"

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"

      - name: Instantiate Julia project
        run: julia --project=bindings/julia -e 'using Pkg; Pkg.instantiate()'

      - name: Run Julia conformance tests
        run: julia --project=bindings/julia -e 'using Pkg; Pkg.test()'

  csharp:
    runs-on: ubuntu-latest
    needs: rust-core
    env:
      MARS_RUNTIME_BIN: ${{ github.workspace }}/.ci-artifacts/mars-runtime-cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: mars-runtime-cli
          path: .ci-artifacts

      - run: chmod +x "$MARS_RUNTIME_BIN"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "11.0.x"
          dotnet-quality: "preview"

      - run: dotnet test MarsRuntime.Tests/MarsRuntime.Tests.csproj
        working-directory: bindings/csharp

      - run: dotnet pack MarsRuntime.csproj -c Release
        working-directory: bindings/csharp

      - name: Smoke test packed C# package
        run: |
          tmpdir=$(mktemp -d)
          cat > "$tmpdir/Test.csproj" <<'EOF'
          <Project Sdk="Microsoft.NET.Sdk">
            <PropertyGroup>
              <TargetFramework>net11.0</TargetFramework>
            </PropertyGroup>
            <ItemGroup>
              <PackageReference Include="MarsRuntime" Version="0.0.0" />
            </ItemGroup>
          </Project>
          EOF
          dotnet restore "$tmpdir/Test.csproj" --source "$GITHUB_WORKSPACE/bindings/csharp/bin/Release"
          dotnet build "$tmpdir/Test.csproj" --no-restore

  python-training:
    runs-on: ubuntu-latest
    needs: rust-core
    env:
      MARS_RUNTIME_BIN: ${{ github.workspace }}/.ci-artifacts/mars-runtime-cli
      WHEEL_PYTHON: ${{ github.workspace }}/.ci-wheel-env/bin/python
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: mars-runtime-cli
          path: .ci-artifacts

      - run: chmod +x "$MARS_RUNTIME_BIN"

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - run: uv python install 3.12

      - run: uv sync --extra dev

      - name: Build and install the Python wheel
        run: |
          rm -f dist/*
          uv build
          wheel=$(find dist -maxdepth 1 -name '*.whl' -print -quit)
          uv run python -m venv .ci-wheel-env
          .ci-wheel-env/bin/python -m pip install "$wheel"

      - name: Run Python training conformance from the wheel environment
        run: |
          cd /tmp
          "$WHEEL_PYTHON" - <<'PY'
          import os
          import numpy as np
          from pymars import Earth
          from pymars import runtime

          assert runtime._rust_backend is not None
          os.environ["PYMARS_USE_RUST_TRAINING"] = "1"

          model = Earth(max_terms=5, max_degree=1, penalty=3.0)
          fitted = model.fit(np.array([[0.0], [1.0], [2.0]]), np.array([1.0, 3.0, 5.0]))
          assert fitted is model
          assert model.fitted_
          exported = model.export_model()
          assert "basis_terms" in exported
          predictions = model.predict(np.array([[0.0], [1.0], [2.0]]))
          np.testing.assert_allclose(predictions, np.array([1.0, 3.0, 5.0]), atol=1e-12)
          PY

  go-training:
    runs-on: ubuntu-latest
    needs: rust-core
    env:
      MARS_RUNTIME_BIN: ${{ github.workspace }}/.ci-artifacts/mars-runtime-cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: mars-runtime-cli
          path: .ci-artifacts

      - run: chmod +x "$MARS_RUNTIME_BIN"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - run: go test -run TestFitModelViaRust ./...
        working-directory: bindings/go

  r-training:
    runs-on: ubuntu-latest
    needs: rust-core
    env:
      MARS_RUNTIME_BIN: ${{ github.workspace }}/.ci-artifacts/mars-runtime-cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: mars-runtime-cli
          path: .ci-artifacts

      - run: chmod +x "$MARS_RUNTIME_BIN"

      - uses: r-lib/actions/setup-r@v2

      - name: Install R dependencies
        run: install.packages("jsonlite", repos = "https://cloud.r-project.org")
        shell: Rscript {0}

      - run: Rscript tests/training.R
        working-directory: bindings/r

  julia-training:
    runs-on: ubuntu-latest
    needs: rust-core
    env:
      MARS_RUNTIME_BIN: ${{ github.workspace }}/.ci-artifacts/mars-runtime-cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: mars-runtime-cli
          path: .ci-artifacts

      - run: chmod +x "$MARS_RUNTIME_BIN"

      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"

      - name: Instantiate Julia project
        run: julia --project=bindings/julia -e 'using Pkg; Pkg.instantiate()'

      - name: Run Julia training smoke test
        run: julia --project=bindings/julia bindings/julia/test/training.jl

  csharp-training:
    runs-on: ubuntu-latest
    needs: rust-core
    env:
      MARS_RUNTIME_BIN: ${{ github.workspace }}/.ci-artifacts/mars-runtime-cli
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          name: mars-runtime-cli
          path: .ci-artifacts

      - run: chmod +x "$MARS_RUNTIME_BIN"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "11.0.x"
          dotnet-quality: "preview"

      - run: dotnet test MarsRuntime.Tests/MarsRuntime.Tests.csproj --filter FullyQualifiedName~RuntimeTrainingTests
        working-directory: bindings/csharp

  typescript-training:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate runtime-only training boundary
        run: |
          node --input-type=module <<'NODE'
          import { fitModel } from "./src/runtime.js";
          let passed = false;
          try {
            fitModel();
          } catch (error) {
            passed = String(error).includes("training is not supported");
          }
          if (!passed) {
            process.exit(1);
          }
          NODE
        working-directory: bindings/typescript
