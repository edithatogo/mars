name: Bindings CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v4
      - run: uv python install 3.12
      - run: uv sync --extra dev
      - run: uv run pytest -q tests/test_binding_conformance.py tests/test_model_spec.py

  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo fmt --check
        working-directory: rust-runtime
      - run: cargo test
        working-directory: rust-runtime

  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./...
        working-directory: bindings/go

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm test
        working-directory: bindings/typescript

  r:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: r-lib/actions/setup-r@v2
      - name: Install R dependencies
        run: install.packages("jsonlite", repos = "https://cloud.r-project.org")
        shell: Rscript {0}
      - run: Rscript tests/conformance.R
        working-directory: bindings/r

  julia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@v2
        with:
          version: "1.10"
      - name: Instantiate Julia project
        run: julia --project=bindings/julia -e 'using Pkg; Pkg.instantiate()'
      - name: Run Julia conformance tests
        run: julia --project=bindings/julia bindings/julia/test/runtests.jl

  csharp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "11.0.x"
          dotnet-quality: "preview"
      - run: dotnet test MarsRuntime.Tests/MarsRuntime.Tests.csproj
        working-directory: bindings/csharp
