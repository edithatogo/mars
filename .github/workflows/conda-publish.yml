# Conda-forge feedstock PR automation
# This workflow creates a PR to conda-forge/staged-recipes after a release.

name: Publish to conda-forge

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.4)'
        required: true
        default: '1.0.4'
        type: string

permissions:
  contents: read

jobs:
  conda-forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute SHA256
        run: |
          curl -sL "https://pypi.org/packages/source/m/mars-earth/mars_earth-${{ steps.tag.outputs.version }}.tar.gz" -o source.tar.gz
          echo "sha256=$(sha256sum source.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
        id: sha

      - name: Generate meta.yaml
        run: |
          cat > /tmp/meta.yaml << 'RECIPE'
          {% set name = "mars-earth" %}
          {% set version = "${VERSION}" %}

          package:
            name: {{ name|lower }}
            version: {{ version }}

          source:
            url: https://pypi.org/packages/source/m/{{ name }}/{{ name|replace('-', '_') }}-{{ version }}.tar.gz
            sha256: ${SHA256}

          build:
            script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
            number: 0

          requirements:
            host:
              - python
              - pip
              - setuptools >=61
            run:
              - python
              - numpy >=1.20.0
              - scikit-learn >=1.0.0
              - matplotlib-base >=3.4.0

          test:
            imports:
              - pymars
            requires:
              - pip
            commands:
              - pip check
              - python -c "import pymars; model = pymars.Earth(); print('mars-earth import OK')"

          about:
            home: https://github.com/edithatogo/mars
            summary: A Pure Python Implementation of Multivariate Adaptive Regression Splines
            description: |
              mars-earth is a pure Python implementation of Multivariate Adaptive
              Regression Splines (MARS), inspired by the popular py-earth library.
              It provides an easy-to-install, scikit-learn compatible version of the
              MARS algorithm without C/Cython dependencies.
            license: Apache-2.0
            license_file: LICENSE
            doc_url: https://edithatogo.github.io/mars/
            dev_url: https://github.com/edithatogo/mars

          extra:
            recipe-maintainers:
              - edithatogo
          RECIPE

      - name: Resolve conda-forge credentials
        id: auth
        shell: bash
        env:
          PAT: ${{ secrets.CONDA_FORGE_PAT }}
        run: |
          set -euo pipefail

          if [ -n "${PAT:-}" ]; then
            echo "::add-mask::$PAT"
            echo "token_present=true" >> "$GITHUB_OUTPUT"
            echo "token=$PAT" >> "$GITHUB_OUTPUT"
          else
            echo "token_present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check for existing staged-recipes PR
        id: existing_pr
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.tag.outputs.version }}
        run: |
          set -euo pipefail

          pr_url="$(gh pr list \
            --repo conda-forge/staged-recipes \
            --search "mars-earth ${VERSION} in:title state:open" \
            --json url \
            --jq '.[0].url // empty')"

          if [ -n "${pr_url:-}" ]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "url=$pr_url" >> "$GITHUB_OUTPUT"
            echo "Open staged-recipes PR already exists: $pr_url"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate conda-forge token presence
        if: steps.existing_pr.outputs.found != 'true'
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ steps.auth.outputs.token_present }}" != "true" ]; then
            echo "Secret CONDA_FORGE_PAT is not available to this workflow."
            exit 1
          fi

      - name: Validate staged-recipes fork push access
        if: steps.existing_pr.outputs.found != 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          set -euo pipefail

          if ! GH_TOKEN="$GH_TOKEN" gh auth status >/dev/null 2>&1; then
            echo "CONDA_FORGE_PAT is not a valid GitHub authentication token."
            exit 1
          fi

          permissions="$(GH_TOKEN="$GH_TOKEN" gh api repos/edithatogo/staged-recipes --jq '.permissions | @json' 2>/dev/null || true)"
          if [ -n "${permissions:-}" ]; then
            echo "Token-visible staged-recipes fork permissions: $permissions"
          fi

          rm -rf /tmp/staged-recipes-permission-check
          git clone --depth 1 https://github.com/conda-forge/staged-recipes.git /tmp/staged-recipes-permission-check
          cd /tmp/staged-recipes-permission-check
          git checkout -b permission-check-${GITHUB_RUN_ID}
          git remote add fork "https://x-access-token:${GH_TOKEN}@github.com/edithatogo/staged-recipes.git"

          if ! git push --dry-run fork permission-check-${GITHUB_RUN_ID} >/dev/null 2>&1; then
            echo "CONDA_FORGE_PAT is present but cannot push to edithatogo/staged-recipes."
            echo "Use a GitHub token with write access to the staged-recipes fork."
            exit 1
          fi

      - name: Clone staged-recipes and create PR
        if: steps.existing_pr.outputs.found != 'true'
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
          VERSION: ${{ steps.tag.outputs.version }}
          SHA256: ${{ steps.sha.outputs.sha256 }}
        run: |
          git clone --depth 1 https://github.com/conda-forge/staged-recipes.git /tmp/staged-recipes
          cd /tmp/staged-recipes

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add fork as remote
          git remote add fork https://github.com/edithatogo/staged-recipes.git
          git remote set-url fork "https://x-access-token:${GH_TOKEN}@github.com/edithatogo/staged-recipes.git"
          git ls-remote fork >/dev/null

          git checkout -b mars-earth-${VERSION}

          mkdir -p recipes/mars-earth
          envsubst < /tmp/meta.yaml > recipes/mars-earth/meta.yaml

          git add recipes/mars-earth/
          git commit -m "mars-earth ${VERSION}"

          git push fork mars-earth-${VERSION}

          gh pr create \
            --repo conda-forge/staged-recipes \
            --title "mars-earth ${VERSION}" \
            --body "New release of [mars-earth ${VERSION}](https://pypi.org/project/mars-earth/${VERSION}/).

          - PyPI: https://pypi.org/project/mars-earth/
          - GitHub: https://github.com/edithatogo/mars

          Auto-generated by CI." \
            --head "edithatogo:mars-earth-${VERSION}" \
            --base "main"

      - name: Report existing staged-recipes PR
        if: steps.existing_pr.outputs.found == 'true'
        run: |
          echo "Skipping PR creation because an open staged-recipes PR already exists:"
          echo "${{ steps.existing_pr.outputs.url }}"
