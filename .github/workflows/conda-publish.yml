# Conda-forge feedstok PR automation
# This workflow creates a PR to conda-forge/staged-recipes after a release.

name: Publish to conda-forge

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 1.0.3)'
        required: true
        default: '1.0.3'
        type: string

permissions:
  contents: read

jobs:
  conda-forge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute SHA256
        run: |
          curl -sL "https://pypi.org/packages/source/m/mars-earth/mars_earth-${{ steps.tag.outputs.version }}.tar.gz" -o source.tar.gz
          echo "sha256=$(sha256sum source.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
        id: sha

      - name: Update meta.yaml with SHA256
        run: |
          sed -i "s/sha256:  # TODO.*/sha256: ${{ steps.sha.outputs.sha256 }}/" .github/conda-recipe/meta.yaml

      - name: Create feedstock PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.CONDA_FORGE_PAT }}
          repository: conda-forge/staged-recipes
          branch: mars-earth-${{ steps.tag.outputs.version }}
          title: "mars-earth ${{ steps.tag.outputs.version }}"
          body: |
            New release of mars-earth ${{ steps.tag.outputs.version }}.

            - PyPI: https://pypi.org/project/mars-earth/
            - GitHub: https://github.com/edithatogo/mars

            Auto-generated by release workflow.
          commit-message: "chore: add mars-earth ${{ steps.tag.outputs.version }}"
          path: .github/conda-recipe
          base: master
